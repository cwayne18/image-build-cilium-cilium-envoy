name: Mirror upstream image
on:
  workflow_dispatch:
  push:
    branches: [master, main]
    paths:
      - '.github/workflows/mirror.yml'

permissions:
  contents: read
  packages: write

# Manifest-preserving mirror of the upstream cilium-envoy image to GHCR.
# This re-tags the exact upstream multi-arch manifest (linux/amd64 + linux/arm64)
# under ghcr.io/cwayne18 -- it is NOT a from-source hardened rebuild. See MIRROR.md.
env:
  SOURCE_IMAGE: quay.io/cilium/cilium-envoy:v1.36.6-1778235340-b87d1e32f522b33bd51701c6476d199326f01496
  TARGET_IMAGE: ghcr.io/cwayne18/hardened-cilium-cilium-envoy:v1.36.6-1778235340-b87d1e32f522b33bd51701c6476d199326f01496

jobs:
  mirror:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
    - name: Set up Docker Buildx
      uses: docker/setup-buildx-action@bb05f3f5519dd87d3ba754cc423b652a5edd6d2c # v4.2.0

    - name: Log in to GHCR
      uses: docker/login-action@af1e73f918a031802d376d3c8bbc3fe56130a9b0 # v3
      with:
        registry: ghcr.io
        username: ${{ github.actor }}
        password: ${{ secrets.GITHUB_TOKEN }}

    - name: Mirror multi-arch manifest to GHCR
      run: |
        set -euo pipefail
        echo "Source: ${SOURCE_IMAGE}"
        echo "Target: ${TARGET_IMAGE}"
        docker buildx imagetools create --tag "${TARGET_IMAGE}" "${SOURCE_IMAGE}"

    - name: Verify pushed manifest is multi-arch
      run: |
        set -euo pipefail
        INSPECT="$(docker buildx imagetools inspect "${TARGET_IMAGE}")"
        echo "${INSPECT}"
        echo "${INSPECT}" | grep -q "linux/amd64" || { echo "missing amd64"; exit 1; }
        echo "${INSPECT}" | grep -q "linux/arm64" || { echo "missing arm64"; exit 1; }
        echo "pushing manifest for ${TARGET_IMAGE} confirmed multi-arch"
