name: Build
on:
  workflow_dispatch:

# NOTE: This component is a known blocker (see BLOCKER.md). The build is not
# runnable on standard GitHub-hosted runners, so it is manual-dispatch only and
# does not run automatically on push/PR.

permissions:
  contents: read

jobs:
  build:
    permissions:
      contents: read
      id-token: write
    runs-on: ubuntu-latest
    steps:
    - name: Check out code
      uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

    - name: Set up Docker Buildx
      uses: docker/setup-buildx-action@bb05f3f5519dd87d3ba754cc423b652a5edd6d2c # v4.2.0

    - name: Build hardened image(s)
      run: make build-image-all
