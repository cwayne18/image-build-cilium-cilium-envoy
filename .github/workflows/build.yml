name: Build
on:
  workflow_dispatch:

# NOTE: This component is a known blocker (see BLOCKER.md). The build is not
# runnable on standard GitHub-hosted runners, so it is manual-dispatch only and
# does not run automatically on push/PR.

permissions:
  contents: read

jobs:
  build:
    permissions:
      contents: read
      id-token: write
    runs-on: ubuntu-latest
    steps:
    - name: Check out code
      uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5

    - name: Set up Docker Buildx
      uses: docker/setup-buildx-action@8d2750c68a42422c14e847fe6c8ac0403b4cbd6f # v3

    - name: Build hardened image(s)
      run: make build-image-all
